<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Epiphone Les Paul buying map</title>
  <desc id="desc">Decision map for choosing Epiphone Les Paul models by budget, neck preference, used value, premium features, modern high gain use, and entry budget.</desc>
  <defs>
    <style>
      .bg { fill: #fffaf2; }
      .start { fill: #8a3b2d; }
      .card { fill: #ffffff; stroke: #dbcdb8; stroke-width: 2; }
      .card-green { fill: #edf6f2; stroke: #246a5a; stroke-width: 3; }
      .line { stroke: #b9a994; stroke-width: 4; stroke-linecap: round; }
      .title { fill: #202124; font: 800 36px Arial, sans-serif; }
      .subtitle { fill: #665f56; font: 500 20px Arial, sans-serif; }
      .start-text { fill: #ffffff; font: 800 25px Arial, sans-serif; }
      .head { fill: #202124; font: 800 22px Arial, sans-serif; }
      .body { fill: #665f56; font: 500 17px Arial, sans-serif; }
      .accent { fill: #8a3b2d; font: 800 17px Arial, sans-serif; }
      .green { fill: #246a5a; font: 800 17px Arial, sans-serif; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="680" rx="28"/>
  <text class="title" x="64" y="68">구매 기준 빠른 선택 지도</text>
  <text class="subtitle" x="64" y="104">예산보다 먼저 원하는 구조와 용도를 정하면 모델명이 훨씬 덜 헷갈립니다.</text>

  <rect class="start" x="420" y="144" width="360" height="86" rx="20"/>
  <text class="start-text" x="492" y="178">먼저 용도를 정합니다</text>
  <text class="start-text" x="488" y="208">신품 / 중고 / 상위 / 입문</text>

  <line class="line" x1="600" y1="230" x2="600" y2="278"/>
  <line class="line" x1="190" y1="278" x2="1010" y2="278"/>
  <line class="line" x1="190" y1="278" x2="190" y2="320"/>
  <line class="line" x1="460" y1="278" x2="460" y2="320"/>
  <line class="line" x1="740" y1="278" x2="740" y2="320"/>
  <line class="line" x1="1010" y1="278" x2="1010" y2="320"/>

  <g transform="translate(70 320)">
    <rect class="card-green" width="240" height="250" rx="16"/>
    <text class="head" x="24" y="44">신품 기본기</text>
    <text class="body" x="24" y="84">Standard 50s / 60s</text>
    <text class="accent" x="24" y="122">50s</text>
    <text class="body" x="72" y="122">두꺼운 넥</text>
    <text class="accent" x="24" y="154">60s</text>
    <text class="body" x="72" y="154">얇고 빠른 넥</text>
    <text class="green" x="24" y="204">가장 무난한 기준점</text>
  </g>

  <g transform="translate(340 320)">
    <rect class="card" width="240" height="250" rx="16"/>
    <text class="head" x="24" y="44">중고 가성비</text>
    <text class="body" x="24" y="84">1959 Outfit</text>
    <text class="body" x="24" y="116">1960 Tribute Plus</text>
    <text class="body" x="24" y="154">Gibson USA 픽업과</text>
    <text class="body" x="24" y="186">하드케이스 포함 여부</text>
    <text class="accent" x="24" y="222">원장착 확인 필수</text>
  </g>

  <g transform="translate(620 320)">
    <rect class="card" width="240" height="250" rx="16"/>
    <text class="head" x="24" y="44">최상급 에피폰</text>
    <text class="body" x="24" y="84">IGC 1959 / 1960</text>
    <text class="body" x="24" y="116">IGC Les Paul Custom</text>
    <text class="body" x="24" y="154">고급 전자부,</text>
    <text class="body" x="24" y="186">open-book 헤드스톡</text>
    <text class="green" x="24" y="222">Gibson에 가까운 감각</text>
  </g>

  <g transform="translate(890 320)">
    <rect class="card" width="240" height="250" rx="16"/>
    <text class="head" x="24" y="44">입문 / 모던</text>
    <text class="body" x="24" y="84">Tribute, Studio E1</text>
    <text class="body" x="24" y="116">Special-II</text>
    <text class="body" x="24" y="154">Prophecy, Futura는</text>
    <text class="body" x="24" y="186">하이게인/다기능용</text>
    <text class="accent" x="24" y="222">체급 구분 먼저</text>
  </g>
</svg>
