<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Gibson pickup type comparison</title>
  <desc id="desc">Gibson 계열에서 자주 만나는 P-90, 커버드 PAF 험버커, 미니 험버커, Firebird 픽업, 오픈 코일 고출력 험버커의 외형과 성향을 비교한 도표</desc>
  <defs>
    <style>
      .bg { fill: #f7f3ec; }
      .title { fill: #1f2528; font: 800 42px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .subtitle { fill: #5d666b; font: 500 20px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .card { fill: #ffffff; stroke: #d8d0c3; stroke-width: 2; rx: 8; }
      .label { fill: #202629; font: 800 25px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .text { fill: #4e565b; font: 500 17px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .note { fill: #2d3336; font: 700 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .pickup-shell { fill: #e9d8b5; stroke: #7d5f35; stroke-width: 5; }
      .pickup-dark { fill: #34383a; stroke: #111516; stroke-width: 5; }
      .pickup-metal { fill: #d7dce0; stroke: #7c858b; stroke-width: 5; }
      .pole { fill: #f8fafb; stroke: #6d7478; stroke-width: 2; }
      .magnet { fill: #c64e3e; }
      .accent-blue { fill: #307c97; }
      .accent-green { fill: #59784c; }
      .accent-gold { fill: #ba7a28; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="675"/>
  <text class="title" x="70" y="76">Gibson 픽업 외형과 성향</text>
  <text class="subtitle" x="70" y="112">커버드와 오픈 코일은 외관 차이이며, 구조, 출력, 장착 모델을 함께 확인해야 합니다.</text>

  <g transform="translate(60 155)">
    <rect class="card" width="330" height="220"/>
    <text class="label" x="28" y="42">P-90 Soapbar</text>
    <rect class="pickup-shell" x="58" y="76" width="214" height="74" rx="18"/>
    <g transform="translate(86 104)">
      <circle class="pole" cx="0" cy="0" r="9"/>
      <circle class="pole" cx="28" cy="0" r="9"/>
      <circle class="pole" cx="56" cy="0" r="9"/>
      <circle class="pole" cx="84" cy="0" r="9"/>
      <circle class="pole" cx="112" cy="0" r="9"/>
      <circle class="pole" cx="140" cy="0" r="9"/>
    </g>
    <text class="text" x="28" y="178">굵은 싱글코일 계열</text>
    <text class="note" x="28" y="205">Junior, Special, 블루스록</text>
  </g>

  <g transform="translate(435 155)">
    <rect class="card" width="330" height="220"/>
    <text class="label" x="28" y="42">Covered PAF</text>
    <rect class="pickup-metal" x="54" y="75" width="222" height="78" rx="12"/>
    <line x1="165" y1="82" x2="165" y2="146" stroke="#8a9298" stroke-width="4"/>
    <g transform="translate(79 105)">
      <circle class="pole" cx="0" cy="0" r="8"/>
      <circle class="pole" cx="30" cy="0" r="8"/>
      <circle class="pole" cx="60" cy="0" r="8"/>
      <circle class="pole" cx="90" cy="0" r="8"/>
      <circle class="pole" cx="120" cy="0" r="8"/>
      <circle class="pole" cx="150" cy="0" r="8"/>
    </g>
    <text class="text" x="28" y="178">금속 커버, 빈티지 이미지</text>
    <text class="note" x="28" y="205">'57 Classic, BurstBucker 계열</text>
  </g>

  <g transform="translate(810 155)">
    <rect class="card" width="330" height="220"/>
    <text class="label" x="28" y="42">Mini Humbucker</text>
    <rect class="pickup-metal" x="77" y="79" width="176" height="70" rx="11"/>
    <line x1="165" y1="86" x2="165" y2="142" stroke="#8a9298" stroke-width="4"/>
    <rect class="accent-blue" x="96" y="104" width="48" height="18" rx="9"/>
    <rect class="accent-blue" x="186" y="104" width="48" height="18" rx="9"/>
    <text class="text" x="28" y="178">작고 선명한 험버커 계열</text>
    <text class="note" x="28" y="205">일부 Deluxe, 변형 라인</text>
  </g>

  <g transform="translate(245 410)">
    <rect class="card" width="330" height="205"/>
    <text class="label" x="28" y="42">Firebird Pickup</text>
    <rect class="pickup-metal" x="78" y="74" width="174" height="58" rx="8"/>
    <rect class="accent-green" x="104" y="92" width="122" height="22" rx="11"/>
    <text class="text" x="28" y="160">밝고 타이트한 전용 구조</text>
    <text class="note" x="28" y="187">Firebird, 슬라이드, 블루스록</text>
  </g>

  <g transform="translate(625 410)">
    <rect class="card" width="330" height="205"/>
    <text class="label" x="28" y="42">Open-coil High Output</text>
    <rect class="pickup-dark" x="55" y="74" width="220" height="70" rx="10"/>
    <line x1="165" y1="81" x2="165" y2="137" stroke="#5b6266" stroke-width="4"/>
    <rect class="magnet" x="83" y="99" width="56" height="18" rx="9"/>
    <rect class="magnet" x="191" y="99" width="56" height="18" rx="9"/>
    <text class="text" x="28" y="160">강한 어택과 높은 출력</text>
    <text class="note" x="28" y="187">496R/500T, 하드록, 메탈</text>
  </g>

  <rect x="70" y="628" width="1060" height="2" fill="#d8d0c3"/>
  <text class="subtitle" x="70" y="655">중고 구매 시에는 커버 교체 여부, 납땜 흔적, 픽업 뒷면 라벨과 저항값까지 함께 확인하세요.</text>
</svg>
