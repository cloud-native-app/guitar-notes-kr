<header class="site-header" role="banner">
  <div class="wrapper site-header__inner">
    <a class="site-title" rel="author" href="{{ '/' | relative_url }}">{{ site.title | escape }}</a>

    <nav class="site-nav" aria-label="주요 메뉴">
      <input type="checkbox" id="nav-trigger" class="nav-trigger" />
      <label for="nav-trigger">
        <span class="menu-icon">
          <svg viewBox="0 0 18 15" width="18" height="15" aria-hidden="true">
            <path d="M18,1.5 L0,1.5 M18,7.5 L0,7.5 M18,13.5 L0,13.5" fill="none" stroke="currentColor" stroke-width="2"/>
          </svg>
        </span>
      </label>

      <div class="trigger">
        {% for item in site.navigation %}
          <a class="page-link" href="{{ item.url | relative_url }}">{{ item.title }}</a>
        {% endfor %}
      </div>
    </nav>
  </div>
</header>
