title: Guitar Notes KR
description: 일렉기타, 레스폴 타입, 픽업, 중고 구매 기준을 사진과 표로 정리한 한국어 기타 노트
lang: ko-KR
timezone: Asia/Seoul
url: "https://cloud-native-app.github.io"
baseurl: "/guitar-notes-kr"
theme: minima
markdown: kramdown

plugins:
  - jekyll-feed
  - jekyll-seo-tag

navigation:
  - title: 가이드
    url: /guides/
  - title: 모델 비교
    url: /guides/epiphone-les-paul-guide.html
  - title: 중고 구매
    url: /guides/budget-les-paul-guide.html
  - title: 자료실
    url: /data/
  - title: 소개
    url: /about.html

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      image: /assets/images/diagrams/les-paul-controls.svg
  - scope:
      path: "guides/budget-les-paul-guide.md"
      type: "pages"
    values:
      description: 국내 중고 시장에서 레스폴 타입 일렉기타를 고를 때 볼 가격대, 모델 후보, 상태 확인 기준을 정리합니다.
      category: 중고 구매
      image: /assets/images/diagrams/used-guitar-checklist.svg
      tags: [레스폴, 중고구매, 입문기타, 모델비교]
      updated: 2026-07-01
      summary: 10만~50만 원대 레스폴 타입 기타를 볼 때 가격, 상태, 전기계통, 넥 상태를 먼저 확인합니다.
  - scope:
      path: "guides/gibson-guitars-pickups.md"
      type: "pages"
    values:
      description: Gibson 계열 기타의 바디 종류, 대표 라인, P-90과 PAF 계열 픽업 성향을 빠르게 비교합니다.
      category: 브랜드/픽업
      image: /assets/images/diagrams/gibson-body-types.svg
      tags: [Gibson, Les Paul, SG, ES, 픽업]
      updated: 2026-07-01
      summary: Les Paul, SG, ES, Explorer, Firebird와 대표 Gibson 픽업 성향을 정리합니다.
  - scope:
      path: "guides/epiphone-les-paul-guide.md"
      type: "pages"
    values:
      description: 현행 Inspired by Gibson, Inspired by Gibson Custom, 구형 Outfit, 입문형·중급형 에피폰 레스폴 모델을 비교합니다.
      category: 모델 가이드
      image: /assets/images/diagrams/epiphone-les-paul-lineup-map.svg
      tags: [Epiphone, Les Paul, 레스폴, 중고구매, 픽업]
      updated: 2026-07-01
      summary: IBG, IGC, Outfit, Tribute Plus, Special-II처럼 헷갈리기 쉬운 에피폰 레스폴 모델을 세대별로 정리합니다.
